<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Breast Cancer Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body style="background:black; color:white;">

  <div class="container my-4">
      <h1 class="text-center mb-4">🩺 Breast Cancer Prediction Model</h1>

      <!-- Optional banner image in /static/img.jpg -->
      <img style="width:100%; height:300px; object-fit:cover;" src="{{ url_for('static', filename='img.jpg') }}" alt="Banner Image" onerror="this.style.display='none'">

      <form action="/predict" method="POST" class="mt-4">
        <div class="row">
          {% for feature, ph in feature_pairs %}
          <div class="col-md-4 mb-3">
            <label class="form-label">{{ feature }}</label>
            <input type="number" step="any" class="form-control" name="{{ feature }}" placeholder="{{ ph }}" required>
          </div>
          {% endfor %}
        </div>

        <!-- Autofill Sample Data Button -->
        <button type="button" class="btn btn-secondary w-100 my-3" onclick="fillSample()">⚡ Autofill Sample Data</button>

        <!-- Predict Button -->
        <button type="submit" class="btn btn-primary w-100">🔍 Predict</button>
      </form>

      {% if prediction %}
      <div class="mt-4">
        {% if label == 'Non-Cancerous' %}
          <div class="card border-success mb-3" style="max-width: 22rem; margin:auto;">
            <img src="{{url_for('static', filename='okay_img.jpg')}}" class="card-img-top" alt="All Good" onerror="this.style.display='none'">
            <div class="card-body text-success">
              <h5 class="card-title">✅ Non-Cancerous</h5>
              <p class="card-text">{{ prediction }}</p>
            </div>
          </div>
        {% elif label == 'Cancerous' %}
          <div class="card border-danger mb-3" style="max-width: 22rem; margin:auto;">
            <img src="{{url_for('static', filename='alert_imge.png')}}" class="card-img-top" alt="Alert" onerror="this.style.display='none'">
            <div class="card-body text-danger">
              <h5 class="card-title">⚠️ Cancerous</h5>
              <p class="card-text">{{ prediction }}</p>
            </div>
          </div>
        {% else %}
          <div class="alert alert-warning text-center" role="alert">
            {{ prediction }}
          </div>
        {% endif %}
      </div>
      {% endif %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Autofill Script -->
  <script>
    function fillSample() {
        const sampleValues = [
            14.5,19.3,92.0,654.5,0.10,
            0.15,0.20,0.09,0.18,0.060,
            0.5,1.2,3.5,20.0,0.010,
            0.020,0.030,0.010,0.020,0.004,
            16.0,25.0,110.0,880.0,0.140,
            0.25,0.30,0.12,0.25,0.080
        ];
        const inputs = document.querySelectorAll("input[type='number']");
        if (inputs.length !== sampleValues.length) {
          alert("Field count mismatch. Please reload the page.");
          return;
        }
        inputs.forEach((input, i) => {
            input.value = sampleValues[i];
        });
    }
  </script>
  </body>
</html>
